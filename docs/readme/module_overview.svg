<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="panel" x1="60" y1="40" x2="1140" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 42px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 20px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #475569; }
      .section { font: 700 18px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #0F172A; letter-spacing: 0.08em; }
      .card-title { font: 700 24px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #0F172A; }
      .card-text { font: 400 17px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #475569; }
      .chip { font: 700 15px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #1D4ED8; }
      .core-title { font: 700 30px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #FFFFFF; }
      .core-text { font: 400 18px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #DCEAFE; }
      .infra-title { font: 700 22px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #0F172A; }
      .infra-text { font: 400 16px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#EDF2F7"/>
  <g opacity="0.55">
    <path d="M0 94H1200" stroke="#D7E0EA"/>
    <path d="M0 178H1200" stroke="#D7E0EA"/>
    <path d="M0 262H1200" stroke="#D7E0EA"/>
    <path d="M0 346H1200" stroke="#D7E0EA"/>
    <path d="M0 430H1200" stroke="#D7E0EA"/>
    <path d="M0 514H1200" stroke="#D7E0EA"/>
    <path d="M0 598H1200" stroke="#D7E0EA"/>
    <path d="M120 0V720" stroke="#D7E0EA"/>
    <path d="M240 0V720" stroke="#D7E0EA"/>
    <path d="M360 0V720" stroke="#D7E0EA"/>
    <path d="M480 0V720" stroke="#D7E0EA"/>
    <path d="M600 0V720" stroke="#D7E0EA"/>
    <path d="M720 0V720" stroke="#D7E0EA"/>
    <path d="M840 0V720" stroke="#D7E0EA"/>
    <path d="M960 0V720" stroke="#D7E0EA"/>
    <path d="M1080 0V720" stroke="#D7E0EA"/>
  </g>

  <rect x="36" y="28" width="1128" height="664" rx="30" fill="url(#panel)" stroke="#D7E0EA"/>

  <text x="78" y="98" class="title">life_tools</text>
  <text x="78" y="130" class="subtitle">离线优先的个人生活工具箱，复用统一的本地基础设施</text>

  <rect x="78" y="152" width="158" height="34" rx="17" fill="#DBEAFE"/>
  <text x="115" y="175" class="chip">业务工具层</text>
  <rect x="252" y="152" width="212" height="34" rx="17" fill="#CCFBF1"/>
  <text x="295" y="175" class="chip" style="fill:#0F766E">共享基础设施</text>

  <line x1="220" y1="300" x2="600" y2="360" stroke="#93C5FD" stroke-width="3"/>
  <line x1="420" y1="300" x2="600" y2="360" stroke="#93C5FD" stroke-width="3"/>
  <line x1="620" y1="300" x2="600" y2="360" stroke="#93C5FD" stroke-width="3"/>
  <line x1="820" y1="300" x2="600" y2="360" stroke="#93C5FD" stroke-width="3"/>
  <line x1="1020" y1="300" x2="600" y2="360" stroke="#93C5FD" stroke-width="3"/>

  <line x1="600" y1="450" x2="160" y2="545" stroke="#A7F3D0" stroke-width="3"/>
  <line x1="600" y1="450" x2="385" y2="545" stroke="#A7F3D0" stroke-width="3"/>
  <line x1="600" y1="450" x2="600" y2="545" stroke="#A7F3D0" stroke-width="3"/>
  <line x1="600" y1="450" x2="815" y2="545" stroke="#A7F3D0" stroke-width="3"/>
  <line x1="600" y1="450" x2="1040" y2="545" stroke="#A7F3D0" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="78" y="212" width="180" height="110" rx="24" fill="#FFF7ED"/>
    <text x="104" y="255" class="card-title">工作记录</text>
    <text x="104" y="286" class="card-text">任务、工时、日历视图</text>
    <text x="104" y="308" class="card-text">语音输入与 AI 整理</text>

    <rect x="288" y="212" width="180" height="110" rx="24" fill="#FDF2F8"/>
    <text x="314" y="255" class="card-title">囤货助手</text>
    <text x="314" y="286" class="card-text">库存、提醒、消耗记录</text>
    <text x="314" y="308" class="card-text">批量录入与标签筛选</text>

    <rect x="498" y="212" width="180" height="110" rx="24" fill="#EFF6FF"/>
    <text x="524" y="255" class="card-title">胡闹厨房</text>
    <text x="524" y="286" class="card-text">食谱、愿望单、计划</text>
    <text x="524" y="308" class="card-text">餐食安排与轻量统计</text>

    <rect x="708" y="212" width="180" height="110" rx="24" fill="#F0FDF4"/>
    <text x="734" y="255" class="card-title">标签管理</text>
    <text x="734" y="286" class="card-text">统一标签体系</text>
    <text x="734" y="308" class="card-text">支撑跨工具复用</text>

    <rect x="918" y="212" width="180" height="110" rx="24" fill="#EEF2FF"/>
    <text x="944" y="255" class="card-title">小蜜助手</text>
    <text x="944" y="286" class="card-text">预选路由与对话</text>
    <text x="944" y="308" class="card-text">消息导出与工具联动</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="336" width="396" height="132" rx="30" fill="url(#header)"/>
    <text x="468" y="392" class="core-title">共享核心能力</text>
    <text x="468" y="422" class="core-text">SQLite、消息中心、通知、主题、设置</text>
    <text x="468" y="448" class="core-text">本地优先数据流与公共服务注入</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="542" width="176" height="102" rx="22" fill="#FFFFFF"/>
    <text x="98" y="582" class="infra-title">AI 能力</text>
    <text x="98" y="608" class="infra-text">OpenAI 风格接口</text>
    <text x="98" y="628" class="infra-text">可配置 Base URL</text>

    <rect x="292" y="542" width="186" height="102" rx="22" fill="#FFFFFF"/>
    <text x="318" y="582" class="infra-title">同步后端</text>
    <text x="318" y="608" class="infra-text">FastAPI 与 sync v2</text>
    <text x="318" y="628" class="infra-text">公网或局域网同步</text>

    <rect x="518" y="542" width="164" height="102" rx="22" fill="#FFFFFF"/>
    <text x="544" y="582" class="infra-title">备份恢复</text>
    <text x="544" y="608" class="infra-text">JSON / TXT 导出</text>
    <text x="544" y="628" class="infra-text">分享接收导入</text>

    <rect x="722" y="542" width="186" height="102" rx="22" fill="#FFFFFF"/>
    <text x="748" y="582" class="infra-title">对象存储</text>
    <text x="748" y="608" class="infra-text">本地、七牛、数据胶囊</text>
    <text x="748" y="628" class="infra-text">按需接入</text>

    <rect x="948" y="542" width="180" height="102" rx="22" fill="#FFFFFF"/>
    <text x="974" y="582" class="infra-title">Dashboard</text>
    <text x="974" y="608" class="infra-text">Next.js 静态面板</text>
    <text x="974" y="628" class="infra-text">快照与用户视图</text>
  </g>
</svg>
