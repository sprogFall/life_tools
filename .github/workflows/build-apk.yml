name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
    paths:
      - 'lib/**'
      - 'test/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'l10n.yaml'
      - 'VERSION'
      - '.github/workflows/build-apk.yml'

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.6'
  FLUTTER_TEST_SHARDS: '2'

jobs:
  prepare:
    name: Prepare Build Context
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.parse-build-type.outputs.should_build }}
      build_type: ${{ steps.parse-build-type.outputs.build_type }}
      app_version: ${{ steps.parse-build-type.outputs.app_version }}
      release_tag: ${{ steps.parse-build-type.outputs.release_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整 git 历史以便查询 tag

      - name: Parse build type from commit message
        id: parse-build-type
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          BRANCH_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          MESSAGE="$COMMIT_MESSAGE"
          LOWER_MESSAGE=$(echo "$MESSAGE" | tr '[:upper:]' '[:lower:]')
          DOC_PREFIX_REGEX='^docs?($|[:( ].*)'
          BRANCH="$BRANCH_NAME"
          REF_KIND="$REF_TYPE"
          VERSION_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$'
          echo "Commit message: $MESSAGE"
          echo "Ref type: $REF_KIND"
          echo "Ref name: $BRANCH"

          # 从 VERSION 文件读取最新版本号（用于测试包）
          get_version_from_file() {
            if [ -f VERSION ]; then
              VERSION_FROM_FILE=$(cat VERSION | tr -d '\r\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || echo "")
              if [ -n "$VERSION_FROM_FILE" ]; then
                echo "$VERSION_FROM_FILE"
                return
              fi
            fi
            # 降级：尝试从最新 git tag 获取
            LATEST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo "")
            if [ -n "$LATEST_TAG" ]; then
              echo "${LATEST_TAG#v}"
              return
            fi
            # 最后降级到默认值
            echo "1.0.0"
          }

          if [[ "$REF_KIND" == "tag" ]]; then
            if [[ ! "$BRANCH" =~ $VERSION_REGEX ]]; then
              echo "Tag does not match vMAJOR.MINOR.PATCH, skipping build"
              echo "should_build=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            APP_VERSION="${BRANCH#v}"
            BUILD_NUMBER="${RUN_NUMBER}"
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
            echo "release_tag=${BRANCH}" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Building RELEASE APK for version tag ${BRANCH}"
            exit 0
          fi

          # 文档类提交（doc:/docs:/doc(...）直接跳过构建
          if [[ "$LOWER_MESSAGE" =~ $DOC_PREFIX_REGEX ]]; then
            echo "Commit message starts with doc/docs, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # dev 分支自动构建 debug 自测包，使用 VERSION 文件版本号 + beta 后缀
          if [[ "$BRANCH" == "dev" ]]; then
            BASE_VERSION=$(get_version_from_file)
            APP_VERSION="${BASE_VERSION}-beta.${RUN_NUMBER}"
            echo "build_type=debug" >> $GITHUB_OUTPUT
            echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
            echo "release_tag=" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Building DEBUG APK (dev branch auto-build) with version ${APP_VERSION}"
            exit 0
          fi

          # main 分支自动构建 release 自测包，使用 VERSION 文件版本号 + beta 后缀
          if [[ "$BRANCH" == "main" ]]; then
            BASE_VERSION=$(get_version_from_file)
            APP_VERSION="${BASE_VERSION}-beta.${RUN_NUMBER}"
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
            echo "release_tag=" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Building RELEASE APK (main branch auto-build) with version ${APP_VERSION}"
            exit 0
          fi

          echo "Unsupported branch/tag for this workflow, skipping build"
          echo "should_build=false" >> $GITHUB_OUTPUT

  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

  flutter-test:
    name: Flutter Test (Shard ${{ matrix.shard_index }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Run shard tests
        run: bash scripts/test_flutter.sh --total-shards ${{ env.FLUTTER_TEST_SHARDS }} --shard-index ${{ matrix.shard_index }}

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [prepare, flutter-analyze, flutter-test]
    if: needs.prepare.outputs.should_build == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Android signing (release)
        if: needs.prepare.outputs.build_type == 'release'
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Missing GitHub Secret: ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] || [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ] || [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "Missing GitHub Secrets: ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_PASSWORD / ANDROID_KEY_ALIAS" >&2
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Build APK
        run: |
          BUILD_TYPE="${{ needs.prepare.outputs.build_type }}"
          APP_VERSION="${{ needs.prepare.outputs.app_version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          COMMIT_SHA="$(git rev-parse HEAD)"
          COMMIT_MESSAGE_BASE64="$(git log -1 --pretty=%B | base64 | tr -d '\n')"
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"

          # 判断是否为预发布版本（体验版）：没有 release_tag 时是预发布
          if [ -z "$RELEASE_TAG" ]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          if [ "$BUILD_TYPE" = "release" ]; then
            flutter build apk --release \
              --build-name="$APP_VERSION" \
              --build-number="$BUILD_NUMBER" \
              --dart-define=APP_VERSION="$APP_VERSION" \
              --dart-define=APP_COMMIT_SHA="$COMMIT_SHA" \
              --dart-define=APP_COMMIT_MESSAGE_BASE64="$COMMIT_MESSAGE_BASE64" \
              --dart-define=APP_IS_PRERELEASE="$IS_PRERELEASE"
          else
            flutter build apk --debug \
              --build-name="$APP_VERSION" \
              --build-number="$BUILD_NUMBER" \
              --dart-define=APP_VERSION="$APP_VERSION" \
              --dart-define=APP_COMMIT_SHA="$COMMIT_SHA" \
              --dart-define=APP_COMMIT_MESSAGE_BASE64="$COMMIT_MESSAGE_BASE64" \
              --dart-define=APP_IS_PRERELEASE="$IS_PRERELEASE"
          fi

      - name: Get APK info
        id: apk-info
        run: |
          BUILD_TYPE="${{ needs.prepare.outputs.build_type }}"
          VERSION_TAG="${{ needs.prepare.outputs.release_tag }}"
          SHORT_SHA="${GITHUB_SHA::12}"
          if [ "$BUILD_TYPE" = "release" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
            if [ -n "$VERSION_TAG" ]; then
              APK_NAME="life_tools-release-${VERSION_TAG}.apk"
            else
              APK_NAME="life_tools-release-${SHORT_SHA}.apk"
            fi
          else
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
            APK_NAME="life_tools-debug-${SHORT_SHA}.apk"
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            APK_SHA256=$(sha256sum "$APK_PATH" | awk '{print $1}')
            echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
            echo "apk_sha256=$APK_SHA256" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.apk-info.outputs.apk_name }}
          path: ${{ steps.apk-info.outputs.apk_path }}
          retention-days: 30
          compression-level: 0

      - name: Publish APK as release asset
        id: release-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD_TYPE="${{ needs.prepare.outputs.build_type }}"
          APK_PATH="${{ steps.apk-info.outputs.apk_path }}"
          APK_NAME="${{ steps.apk-info.outputs.apk_name }}"
          APK_SHA256="${{ steps.apk-info.outputs.apk_sha256 }}"
          BRANCH="${{ github.ref_name }}"
          SHORT_SHA="${GITHUB_SHA::12}"
          VERSION_TAG="${{ needs.prepare.outputs.release_tag }}"
          APP_VERSION="${{ needs.prepare.outputs.app_version }}"
          if [ -n "$VERSION_TAG" ]; then
            TAG_NAME="$VERSION_TAG"
            RELEASE_TITLE="小蜜 ${APP_VERSION}"
            PRERELEASE_FLAG=""
          else
            TAG_NAME="apk-${BRANCH}-${SHORT_SHA}"
            RELEASE_TITLE="APK ${BUILD_TYPE} ${BRANCH} ${SHORT_SHA}"
            PRERELEASE_FLAG="--prerelease"
          fi
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${APK_NAME}"
          MIRROR_BASE_URL="${{ vars.APK_MIRROR_BASE_URL }}"
          MIRROR_URL=""
          if [ -n "$MIRROR_BASE_URL" ]; then
            MIRROR_BASE_URL="${MIRROR_BASE_URL%/}"
            MIRROR_URL="${MIRROR_BASE_URL}/${TAG_NAME}/${APK_NAME}"
          fi
          RELEASE_NOTES=$(cat <<EOF
          Automated ${BUILD_TYPE} APK build.

          Version: ${APP_VERSION}
          Ref: ${BRANCH}
          SHA256: ${APK_SHA256}

          Commit: ${GITHUB_SHA}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          if [ -n "$MIRROR_URL" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}"$'\n'"APK-Mirror: ${MIRROR_URL}"
          fi

          # 先重命名 APK 文件为目标名称
          RENAMED_APK_PATH="$(dirname "$APK_PATH")/${APK_NAME}"
          SHA256_PATH="${RENAMED_APK_PATH}.sha256"
          cp "$APK_PATH" "$RENAMED_APK_PATH"
          printf '%s  %s\n' "$APK_SHA256" "$APK_NAME" > "$SHA256_PATH"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$RENAMED_APK_PATH" "$SHA256_PATH" --clobber
            gh release edit "$TAG_NAME" --notes "$RELEASE_NOTES"
          else
            gh release create "$TAG_NAME" "$RENAMED_APK_PATH" "$SHA256_PATH" \
              --target "${GITHUB_SHA}" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              $PRERELEASE_FLAG
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "mirror_url=$MIRROR_URL" >> "$GITHUB_OUTPUT"

      - name: Create release summary
        run: |
          BUILD_TYPE="${{ needs.prepare.outputs.build_type }}"
          APP_VERSION="${{ needs.prepare.outputs.app_version }}"
          APK_NAME="${{ steps.apk-info.outputs.apk_name }}"
          APK_SIZE="${{ steps.apk-info.outputs.apk_size }}"
          APK_SHA256="${{ steps.apk-info.outputs.apk_sha256 }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          BRANCH="${{ github.ref_name }}"
          RELEASE_URL="${{ steps.release-info.outputs.release_url }}"
          DOWNLOAD_URL="${{ steps.release-info.outputs.download_url }}"
          MIRROR_URL="${{ steps.release-info.outputs.mirror_url }}"
          
          echo "## 📱 APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: $BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: $BUILD_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "- **App Version**: $APP_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **APK Name**: $APK_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **APK Size**: $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **APK SHA256**: $APK_SHA256" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: $COMMIT_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: $COMMIT_AUTHOR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          if [ -n "$MIRROR_URL" ]; then
            echo "- [Mirror APK download]($MIRROR_URL)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- [Direct APK download]($DOWNLOAD_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- [Release page]($RELEASE_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact fallback is still available on this Actions run page." >> $GITHUB_STEP_SUMMARY
